name: Build (Windows + Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "CUDA ${{ matrix.cuda }} / ${{ matrix.label }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            cuda: "13.2.0"
            label: "VS17"
            generator: "Visual Studio 17 2022"
            vc_toolset_dir: "v170"
            cmake_config_args: "-A x64"

          - os: windows-2025-vs2026
            cuda: "13.2.0"
            label: "VS18"
            generator: "Visual Studio 18 2026"
            vc_toolset_dir: "v180"
            cmake_config_args: "-A x64"

          - os: ubuntu-22.04
            cuda: "13.2.0"
            label: "Linux-GCC"
            generator: "Ninja"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          use-github-cache: true

      - name: Install CUDA VS integration
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Derive "12.4" from "12.4.0"
          $cuda_maj_min = "${{ matrix.cuda }}" -replace '^(\d+\.\d+)\.\d+$', '$1'
          $src = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${cuda_maj_min}\extras\visual_studio_integration\MSBuildExtensions"

          if (-not (Test-Path $src)) {
            Write-Error "CUDA VS integration source not found: $src"
            exit 1
          }

          # vswhere is always at this path on GitHub-hosted Windows runners.
          $vswhere = 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe'
          $vs_dir = & $vswhere -latest -products * -property installationPath
          if (-not $vs_dir) {
            Write-Error "vswhere could not locate a Visual Studio installation."
            exit 1
          }

          $dst = Join-Path $vs_dir "MSBuild\Microsoft\VC\${{ matrix.vc_toolset_dir }}\BuildCustomizations"
          if (-not (Test-Path $dst)) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
          }

          Write-Host "Copying CUDA VS integration"
          Write-Host "  from: $src"
          Write-Host "    to: $dst"
          Copy-Item "$src\*" $dst -Force

          Write-Host "Files installed:"
          Get-ChildItem $dst -Filter "CUDA*" | Select-Object -ExpandProperty Name

      # Pin Python so that both pip and CMake's find_package(Python) use the same.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install numpy

      - name: Show tool versions
        shell: bash
        run: |
          cmake --version | head -1
          nvcc --version

      - name: Configure CMake
        run: |
          cmake -B build `
            -G "${{ matrix.generator }}" ${{ matrix.cmake_config_args || '' }} `
            -DMATX_BUILD_TESTS=OFF `
            -DMATX_BUILD_EXAMPLES=ON `
            -DMATX_BUILD_BENCHMARKS=OFF `
            -DMATX_BUILD_DOCS=OFF `
            -DCMAKE_CUDA_ARCHITECTURES="80;90"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.label }}-cuda${{ matrix.cuda }}
          path: |
            build/**/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/*.log
          retention-days: 7
