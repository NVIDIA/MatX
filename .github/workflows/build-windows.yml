# Windows build-only CI workflow for MatX.
#
# Goals:
#   - Validate that MatX compiles on Windows with MSVC (VS 17 / VS 18) and nvcc.
#   - Run on every push to main and on every pull request targeting main.
#   - No GPU is available on GitHub-hosted runners, so only compilation is
#     validated (no test execution). Use a self-hosted runner with a GPU to
#     add ctest execution.
#
# Generator choice - Visual Studio generators:
#   CMake's Visual Studio generators require the CUDA MSBuild toolset
#   (CUDA xx.x.targets / .props) to be present in the VS BuildCustomizations
#   directory. The CUDA network installer sometimes skips writing those files
#   during headless CI, producing the CMake error "No CUDA toolset found."
#   The "Install CUDA VS integration" step below copies the files manually
#   from the toolkit's extras/visual_studio_integration/MSBuildExtensions/
#   directory into the correct VS BuildCustomizations directory so the VS
#   generator can find the CUDA toolset reliably.
#
# CUDA note:
#   GitHub-hosted Windows runners do not have the CUDA Toolkit pre-installed.
#   The Jimver/cuda-toolkit action downloads and installs it. The full toolkit
#   is installed (no sub-packages restriction) because the component layout
#   differs between CUDA versions and partial installs can omit headers such
#   as crt/host_config.h that cuda_runtime.h includes unconditionally. Downloads
#   are cached between runs via use-github-cache so subsequent runs are fast.
#
# VS 18 (Visual Studio 2026) note:
#   The windows-2025-vs2026 runner label targets the Windows Server 2025 image
#   with VS 18 (2026) pre-installed. If that label is not yet available on
#   GitHub-hosted runners the VS18 legs will queue indefinitely; replace with
#   the correct label once GitHub publishes it.
#   See: https://github.com/actions/runner-images

name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "CUDA ${{ matrix.cuda }} / ${{ matrix.vs_label }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            cuda: "12.4.0"
            vs_label: "VS17"
            vs_generator: "Visual Studio 17 2022"
            vc_toolset_dir: "v170"

          - os: windows-2022
            cuda: "13.2.0"
            vs_label: "VS17"
            vs_generator: "Visual Studio 17 2022"
            vc_toolset_dir: "v170"

          - os: windows-2025-vs2026
            cuda: "13.2.0"
            vs_label: "VS18"
            vs_generator: "Visual Studio 18 2026"
            vc_toolset_dir: "v180"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # Install CUDA Toolkit (full install, no sub-packages restriction).
      # Must run BEFORE the VS integration copy step below.
      # Docs: https://github.com/Jimver/cuda-toolkit
      # ------------------------------------------------------------------
      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          use-github-cache: true

      # ------------------------------------------------------------------
      # The CUDA network installer sometimes skips the VS MSBuild integration
      # step (writing CUDA x.y.targets / .props into BuildCustomizations).
      # Copy them manually from the toolkit's extras directory so the CMake
      # Visual Studio generator can locate the CUDA toolset.
      # ------------------------------------------------------------------
      - name: Install CUDA VS integration
        shell: pwsh
        run: |
          # Derive "12.4" from "12.4.0"
          $cuda_maj_min = "${{ matrix.cuda }}" -replace '^(\d+\.\d+)\.\d+$', '$1'
          $src = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${cuda_maj_min}\extras\visual_studio_integration\MSBuildExtensions"

          if (-not (Test-Path $src)) {
            Write-Error "CUDA VS integration source not found: $src"
            exit 1
          }

          # vswhere is always at this path on GitHub-hosted Windows runners.
          $vswhere = 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe'
          $vs_dir = & $vswhere -latest -products * -property installationPath
          if (-not $vs_dir) {
            Write-Error "vswhere could not locate a Visual Studio installation."
            exit 1
          }

          $dst = Join-Path $vs_dir "MSBuild\Microsoft\VC\${{ matrix.vc_toolset_dir }}\BuildCustomizations"
          if (-not (Test-Path $dst)) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
          }

          Write-Host "Copying CUDA VS integration"
          Write-Host "  from: $src"
          Write-Host "    to: $dst"
          Copy-Item "$src\*" $dst -Force

          Write-Host "Files installed:"
          Get-ChildItem $dst -Filter "CUDA*" | Select-Object -ExpandProperty Name

      - name: Install Python dependencies
        run: pip install numpy

      - name: Show tool versions
        shell: bash
        run: |
          cmake --version | head -1
          nvcc --version

      # ------------------------------------------------------------------
      # CMake configure with the Visual Studio generator.
      # The VS generator locates cl.exe automatically from the VS install.
      # CMAKE_BUILD_TYPE is not used with multi-config VS generators;
      # the config is selected at build time via --config Release.
      # ------------------------------------------------------------------
      - name: Configure CMake
        run: |
          cmake -B build `
            -G "${{ matrix.vs_generator }}" `
            -A x64 `
            -DMATX_BUILD_TESTS=ON `
            -DMATX_BUILD_EXAMPLES=ON `
            -DMATX_BUILD_BENCHMARKS=ON `
            -DMATX_BUILD_DOCS=OFF `
            -DCMAKE_CUDA_ARCHITECTURES="80;90"

      # ------------------------------------------------------------------
      # Build using all available cores.
      # ------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # ------------------------------------------------------------------
      # Upload build logs on failure for diagnosis.
      # ------------------------------------------------------------------
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.vs_label }}-cuda${{ matrix.cuda }}
          path: |
            build/**/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          retention-days: 7
