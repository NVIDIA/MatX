# Windows build-only CI workflow for MatX.
#
# Goals:
#   - Validate that MatX compiles on Windows with MSVC (VS 17 / VS 18) and nvcc.
#   - Run on every push to main and on every pull request targeting main.
#   - No GPU is available on GitHub-hosted runners, so only compilation is
#     validated (no test execution). Use a self-hosted runner with a GPU to
#     add ctest execution.
#
# Generator choice - Ninja instead of "Visual Studio XX":
#   CMake's Visual Studio generators require the CUDA MSBuild toolset
#   (CUDA xx.x.targets / .props) to be installed in the VS BuildCustomizations
#   directory. The CUDA network installer often fails to write those files
#   during a headless CI install, producing the CMake error:
#     "No CUDA toolset found."
#   Using the Ninja generator avoids this requirement entirely. nvcc still uses
#   cl.exe as the host compiler (set via CMAKE_CUDA_HOST_COMPILER / the MSVC
#   dev-cmd environment), which is identical to the local VS build.
#   ilammy/msvc-dev-cmd selects the correct VS version (17 or 18) and puts
#   the matching cl.exe / link.exe on PATH before CMake runs.
#
# CUDA note:
#   GitHub-hosted Windows runners do not have the CUDA Toolkit pre-installed.
#   The Jimver/cuda-toolkit action downloads and installs it. The full toolkit
#   is installed (no sub-packages restriction) because the component layout
#   differs between CUDA versions and partial installs can omit headers such
#   as crt/host_config.h that cuda_runtime.h includes unconditionally. Downloads
#   are cached between runs via use-github-cache so subsequent runs are fast.
#
# VS 18 (Visual Studio 2026) note:
#   The windows-2025-vs2026 runner label targets the Windows Server 2025 image
#   with VS 18 (2026) pre-installed. If that label is not yet available on
#   GitHub-hosted runners the VS18 legs will queue indefinitely; replace with
#   the correct label once GitHub publishes it.
#   See: https://github.com/actions/runner-images

name: Build (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "CUDA ${{ matrix.cuda }} / ${{ matrix.vs_label }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            cuda: "12.4.0"
            vs_version: "2022"
            vs_label: "VS17"

          - os: windows-2025-vs2026
            cuda: "12.4.0"
            vs_version: "2026"
            vs_label: "VS18"

          - os: windows-2022
            cuda: "13.2.0"
            vs_version: "2022"
            vs_label: "VS17"

          - os: windows-2025-vs2026
            cuda: "13.2.0"
            vs_version: "2026"
            vs_label: "VS18"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # Set up the MSVC developer environment for the selected VS version.
      # This puts the correct cl.exe / link.exe / lib.exe on PATH and sets
      # INCLUDE / LIB so that nvcc and CMake find the right toolchain without
      # needing the Visual Studio CMake generator or the CUDA VS toolset.
      # ------------------------------------------------------------------
      - name: Set up MSVC ${{ matrix.vs_version }} environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: ${{ matrix.vs_version }}

      # ------------------------------------------------------------------
      # Install CUDA Toolkit (full install, no sub-packages restriction).
      # Docs: https://github.com/Jimver/cuda-toolkit
      # ------------------------------------------------------------------
      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          use-github-cache: true

      - name: Show tool versions
        shell: bash
        run: |
          nvcc --version
          cl.exe 2>&1 | head -2 || true

      # ------------------------------------------------------------------
      # CMake configure with Ninja.
      # CMAKE_CUDA_HOST_COMPILER is set explicitly to cl.exe so nvcc uses
      # the MSVC version selected by ilammy/msvc-dev-cmd regardless of any
      # other cl.exe that may be on PATH.
      # ------------------------------------------------------------------
      - name: Configure CMake
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_CUDA_HOST_COMPILER=cl `
            -DMATX_BUILD_TESTS=ON `
            -DMATX_BUILD_EXAMPLES=ON `
            -DMATX_BUILD_BENCHMARKS=ON `
            -DMATX_BUILD_DOCS=OFF `
            -DCMAKE_CUDA_ARCHITECTURES="80;90" `
            -DCMAKE_BUILD_TYPE=Release

      # ------------------------------------------------------------------
      # Build using all available cores.
      # ------------------------------------------------------------------
      - name: Build
        run: cmake --build build --parallel

      # ------------------------------------------------------------------
      # Upload build logs on failure for diagnosis.
      # ------------------------------------------------------------------
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.vs_label }}-cuda${{ matrix.cuda }}
          path: |
            build/**/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          retention-days: 7
